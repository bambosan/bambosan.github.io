<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8231611512488101" crossorigin="anonymous"></script>
    <style>
      :root {
        --bg-main: #0e0f13;
        --bg-soft: #151823;
        --accent: #6ce1b6;
        --text-main: #e7e9ee;
        --text-soft: #b6b9c3;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg-main);
        color: var(--text-main);
        line-height: 1.7;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }
      .container {
        max-width: 800px;
        width: 100%;
        text-align: center;
      }
      .top-section {
        position: sticky;
        top: 0;
        background: rgba(14, 15, 19, 0.95);
        backdrop-filter: blur(10px);
        padding: 2rem 0;
        z-index: 10;
        border-bottom: 1px solid var(--bg-soft);
        margin-bottom: 2rem;
      }
      h2 {
        font-size: 2rem;
        color: var(--accent);
      }
      .ad-space {
        background: var(--bg-soft);
        border: 1px dashed var(--text-soft);
        border-radius: 10px;
        padding: 2rem;
        margin: 2rem 0;
        color: var(--text-soft);
        font-size: 0.9rem;
        min-height: 150px;
      }
      .bottom-section {
        margin-top: 2rem;
        margin-bottom: 4rem;
        display: none;
      }
      .download-btn {
        display: inline-block;
        background: var(--accent);
        color: var(--bg-main);
        padding: 1rem 3rem;
        font-size: 1.2rem;
        font-weight: 700;
        border-radius: 8px;
        text-decoration: none;
        transition: transform 0.2s, opacity 0.2s;
      }
      .download-btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }
    </style>
  </head>
  <body>

    <div class="container top-section">
      <h2 id="cd">Please wait...</h2>
    </div>

    <div class="container">
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="ad-space">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8231611512488101" data-ad-slot="4141086993" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </div>

    <div class="container bottom-section" id="bottom-section">
      <a class="download-btn" id="dl">Download Now</a>
    </div>

    <script>
      window.scrollTo(0, 0);

      const qurl = new URLSearchParams(window.location.search);
      const cd = document.getElementById('cd');
      const dl = document.getElementById('dl');
      const bottomSection = document.getElementById('bottom-section');

      if (!qurl.has('durl')) {
        cd.innerHTML = 'What do you want?';
      } else {
        let i = 10;
        cd.innerHTML = `Please wait in ${i} seconds...`;
        let t = setInterval(() => {
          i--;
          if (i <= 0) {
            clearInterval(t);
            cd.innerHTML = "Please scroll to the bottom to download!";
            try {
              const urls = atob(qurl.get('durl'));
              dl.href = urls;
              bottomSection.style.display = 'block';
            } catch(e) {
              cd.innerHTML = "Error processing download link.";
            }
          } else {
            cd.innerHTML = `Starting download in ${i} seconds...`;
          }
        }, 1000);
      }
    </script>
  </body>
</html>
